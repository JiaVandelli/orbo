<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbo - Il gusto ti orbita</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,sans-serif;background:linear-gradient(180deg,#1a0b2e 0%,#0f051a 100%);color:#fff;min-height:100vh}
    body.no-scroll{overflow:hidden}
    button,input,select{font:inherit;border:0;cursor:pointer;background:none}
    img{display:block;width:100%;height:100%;object-fit:cover}
    .hidden{display:none!important}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:11px 18px;background:linear-gradient(135deg,#1a0b2e 0%,#2d1b4e 60%,#3d1b80 100%);border-bottom:1px solid rgba(255,179,71,.2);box-shadow:0 4px 24px rgba(255,140,0,.18)}
    .topbar-logo{height:44px;width:44px;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(255,180,71,.6))}
    .topbar-slogan{flex:1;font-family:'Arial Black',Arial,sans-serif;font-size:16px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;background:linear-gradient(180deg,#FFB347 0%,#FF8C00 60%,#E06500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(1px 1px 0 #7a3000)}
    .topbar-btn{width:46px;height:46px;display:grid;place-items:center;background:linear-gradient(135deg,#2d1b4e,#1a0b2e);border:2px solid rgba(255,140,0,.45);border-radius:13px;box-shadow:0 4px 16px rgba(255,140,0,.2)}

    /* VIEWS */
    .view{display:none;animation:fadeUp .28s ease}
    .view.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* HERO */
    .hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:80px 20px 48px;background:radial-gradient(ellipse at center,#2d1b4e 0%,#1a0b2e 65%,#0f051a 100%)}
    .hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.7)1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.3)1px,transparent 1px);background-size:90px 90px,45px 45px;background-position:0 0,22px 22px;opacity:.13}
    
    /* CUBO ORBO */
    .hero-logo{position:relative;z-index:2;width:180px;height:180px;filter:drop-shadow(0 0 32px rgba(255,140,0,.7));animation:pulse-logo 3.5s ease-in-out infinite}
    @keyframes pulse-logo{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .orbit{position:absolute;top:50%;left:50%;width:400px;height:400px;margin:-200px 0 0 -200px;animation:spin 26s linear infinite;pointer-events:none;z-index:1}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    .hero-text{position:relative;z-index:2;text-align:center;margin-top:36px;max-width:540px}
    .hero-kicker{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#FFB347;margin-bottom:12px}
    .hero-title{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(24px,5vw,42px);font-weight:900;line-height:1.15;margin-bottom:14px;background:linear-gradient(180deg,#FFB347 0%,#FF8C00 55%,#E06500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(2px 2px 0 #7a3000)}
    .hero-sub{font-size:14px;color:#c0aee0;line-height:1.75;margin-bottom:28px}
    .hero-sub strong{color:#FFB347}
    .hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

    /* BUTTONS */
    .btn-primary{background:linear-gradient(135deg,#FF8C00,#FFB347);padding:15px 36px;border-radius:999px;font-family:'Arial Black',sans-serif;font-size:14px;font-weight:900;color:#1a0b2e;text-transform:uppercase;letter-spacing:.5px;box-shadow:0 6px 24px rgba(255,140,0,.5);transition:transform .18s}
    .btn-primary:hover{transform:translateY(-3px)}
    .btn-ghost{background:rgba(255,140,0,.08);border:2px solid rgba(255,140,0,.45);padding:15px 36px;border-radius:999px;font-family:'Arial Black',sans-serif;font-size:14px;font-weight:900;color:#FFB347;text-transform:uppercase}

    /* QUICK */
    .quick-sections{background:#0a0318;padding:40px 16px 48px;display:flex;flex-direction:column;gap:14px;align-items:center}
    .quick-card{width:100%;max-width:560px;display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,#2d1b4e,#1a0b2e);border:1px solid rgba(255,140,0,.3);border-radius:20px;padding:22px 24px;cursor:pointer;transition:transform .18s}
    .quick-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(255,140,0,.22)}

    /* SEARCH & CARDS - stile tuo originale */
    .view-inner{padding:20px 16px 48px;max-width:760px;margin:0 auto}
    .view-title{font-size:22px;font-weight:800;color:#FFB347;margin-bottom:16px}
    .search-bar{display:flex;align-items:center;gap:10px;background:rgba(45,27,78,.85);border:1px solid rgba(255,140,0,.3);border-radius:16px;padding:0 16px;margin-bottom:14px}
    .search-bar input{flex:1;height:54px;background:transparent;color:#fff;font-size:.97rem}
    .search-bar input::placeholder{color:rgba(255,179,71,.4)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .chip{padding:7px 14px;border-radius:999px;border:1px solid rgba(255,140,0,.3);background:rgba(45,27,78,.8);color:rgba(255,179,71,.7);font-size:.88rem;font-weight:600}
    .chip.active{background:#FF8C00;color:#1a0b2e;border-color:#FF8C00}
    .result-card{background:linear-gradient(135deg,#2d1b4e,#1a0b2e);border:1px solid rgba(255,140,0,.22);border-radius:20px;overflow:hidden;margin-bottom:14px;display:grid;grid-template-columns:120px 1fr;cursor:pointer}
    .rc-img{position:relative;height:100%;min-height:120px}
    .rc-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:999px;font-size:.75rem;font-weight:700;background:rgba(255,140,0,.85);color:#1a0b2e}
    .rc-body{padding:14px 16px}
    .rc-name{font-size:1rem;font-weight:800;color:#FFD580}
    .rc-cuisine{font-size:.82rem;color:rgba(255,179,71,.55);margin-top:2px}
    .rc-desc{font-size:.85rem;color:rgba(200,184,232,.75);line-height:1.55;margin:6px 0 10px}
    .rc-footer{display:flex;justify-content:space-between;align-items:center}
    .rc-status
<header class="topbar">
  <svg class="topbar-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,15 75,30 75,60 50,75 25,60 25,30" fill="#FF8C00"/>
  </svg>
  <span class="topbar-slogan">Il gusto ti orbita</span>
  <button class="topbar-btn">⋯</button>
</header>

<main>
  <!-- HOME -->
  <section class="view active" id="view-home">
    <div class="hero">
      <div class="orbit"></div>
      
      <!-- CUBO ORBO VERO -->
      <div class="hero-logo">
        <svg width="180" height="180" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="t" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB347"/><stop offset="100%" stop-color="#E06500"/></linearGradient>
            <linearGradient id="l" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7A00"/><stop offset="100%" stop-color="#A64500"/></linearGradient>
            <linearGradient id="r" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#CC5500"/></linearGradient>
          </defs>
          <g transform="translate(150,150)">
            <polygon points="-60,0 -20,-40 60,-40 20,0" fill="url(#t)"/>
            <polygon points="-60,0 -60,40 -20,80 20,40 20,0" fill="url(#l)"/>
            <polygon points="20,0 60,-40 60,0 20,40" fill="url(#r)"/>
          </g>
          <text x="150" y="260" text-anchor="middle" font-family="Arial Black" font-size="42" fill="#FF8C00" font-weight="900">ORBO</text>
        </svg>
      </div>

      <div class="hero-text">
        <p class="hero-kicker">Scopri il gusto</p>
        <h1 class="hero-title">Il locale perfetto,<br>a portata di tap</h1>
        <p class="hero-sub">Cerca per atmosfera, cucina o occasione.<br><strong>Orbo ti porta dove vuoi essere.</strong></p>
        <div class="hero-cta">
          <button class="btn-primary" onclick="navigate('search')">Inizia la ricerca →</button>
          <button class="btn-ghost" onclick="getNearby()">📍 Vicino a me</button>
        </div>
      </div>
    </div>
    <div class="quick-sections">
      <div class="quick-card" onclick="navigate('search')">
        <span style="font-size:1.9rem">🍝</span>
        <div><p style="font-size:9px;color:#FF8C00;font-weight:900;letter-spacing:2px">ESPLORA</p><h3 style="font-size:18px;font-weight:900;background:linear-gradient(180deg,#FFB347,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Categorie popolari</h3></div>
      </div>
      <div class="quick-card" onclick="navigate('search')">
        <span style="font-size:1.9rem">💡</span>
        <div><p style="font-size:9px;color:#FF8C00;font-weight:900;letter-spacing:2px">ISPIRAZIONE</p><h3 style="font-size:18px;font-weight:900;background:linear-gradient(180deg,#FFB347,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Idee per oggi</h3></div>
      </div>
    </div>
  </section>

  <!-- SEARCH -->
  <section class="view" id="view-search">
    <div class="view-inner">
      <h2 class="view-title">🔍 Cerca</h2>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Pizza, sushi, romantico..." autocomplete="off" />
      </div>
      <div class="chips" id="chips"></div>
      <p id="results-count" style="font-size:.88rem;color:rgba(255,179,71,.5);margin-bottom:14px"></p>
      <div id="results-list"></div>
      <div class="empty-state" id="empty-state">
        <div style="font-size:2rem">🍽️</div>
        <p>Cerca qualcosa o clicca "Vicino a me"</p>
      </div>
    </div>
  </section>
</main>

<div id="gmap"></div>
<div class="toast" id="toast"></div>
<script>
let placesService, map, userLoc = null;
let VENUES = [];
const CATS = [
  {id:'all',label:'Tutto',icon:'✦'},
  {id:'restaurant',label:'Ristoranti',icon:'🍝'},
  {id:'cafe',label:'Bar',icon:'☕'},
  {id:'bakery',label:'Pasticcerie',icon:'🧁'},
  {id:'ice_cream',label:'Gelaterie',icon:'🍨'}
];
const state = {favs:JSON.parse(localStorage.getItem('orbo_favs')||'[]')};

function $(id){return document.getElementById(id)}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function navigate(v){document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active',s.id==='view-'+v));if(v==='search')$('search-input').focus()}

function initMap(){
  map = new google.maps.Map($('gmap'),{center:{lat:44.4949,lng:11.3426},zoom:15});
  placesService = new google.maps.places.PlacesService(map);
  getNearby();
  renderChips();
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      userLoc={lat:p.coords.latitude,lng:p.coords.longitude};
      map.setCenter(userLoc); getNearby();
    });
  }
}

function getNearby(){
  toast('📍 Cerco vicino a te...');
  const loc = userLoc || map.getCenter();
  placesService.nearbySearch({location:loc,radius:2000,type:'restaurant'},(res,st)=>{
    if(st==='OK') updateVenues(res); else toast('Errore API')
  });
}

function searchAPI(q){
  if(!q){$('empty-state').style.display='block';$('results-list').innerHTML='';return}
  placesService.textSearch({query:q+' ristorante',location:map.getCenter(),radius:5000},(res,st)=>{
    if(st==='OK') updateVenues(res);
  });
}

function updateVenues(places){
  VENUES = places.slice(0,20).map((p,i)=>({
    id:p.place_id,
    name:p.name,
    address:p.vicinity||'',
    rating:p.rating||4.2,
    price:'€'.repeat(p.price_level||2),
    openNow:p.opening_hours?.open_now,
    photo:p.photos?.[0]?.getUrl({maxWidth:400})||'https://images.unsplash.com/photo-1414235077428?w=600',
    lat:p.geometry.location.lat(),
    lng:p.geometry.location.lng()
  }));
  renderResults();
}

function renderChips(){
  $('chips').innerHTML = CATS.map(c=>`<button class="chip ${c.id==='all'?'active':''}" onclick="filterCat('${c.id}',this)">${c.icon} ${c.label}</button>`).join('');
}

function filterCat(id,el){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active');
  if(id==='all'){renderResults();return}
  const type = id==='ice_cream'?'gelateria':id;
  placesService.nearbySearch({location:map.getCenter(),radius:2000,type:id==='ice_cream'?'store':id},(res,st)=>{
    if(st==='OK') updateVenues(res.filter(p=>p.name.toLowerCase().includes(type)||true));
  });
}

function renderResults(){
  const list=$('results-list'), count=$('results-count'), empty=$('empty-state');
  if(!VENUES.length){empty.style.display='block';list.innerHTML='';count.textContent='';return}
  empty.style.display='none';
  count.textContent=`${VENUES.length} locali trovati 🔥`;
  list.innerHTML = VENUES.map(v=>`
    <article class="result-card" onclick="openMaps('${v.lat}','${v.lng}')">
      <div class="rc-img"><img src="${v.photo}" loading="lazy"><span class="rc-badge">${v.price}</span></div>
      <div class="rc-body">
        <div class="rc-name">${v.name}</div>
        <div class="rc-cuisine">${v.address}</div>
        <div class="rc-desc">⭐ ${v.rating} · ${v.openNow?'Aperto':'Chiuso'}</div>
        <div class="rc-footer">
          <span class="rc-status ${v.openNow?'open':'closed'}">${v.openNow?'Aperto ora':'Chiuso'}</span>
          <button class="fav-btn ${state.favs.includes(v.id)?'active':''}" onclick="event.stopPropagation();toggleFav('${v.id}')">❤️</button>
        </div>
      </div>
    </article>`).join('');
}

function toggleFav(id){
  const i=state.favs.indexOf(id);
  if(i>-1)state.favs.splice(i,1);else state.favs.push(id);
  localStorage.setItem('orbo_favs',JSON.stringify(state.favs));
  toast(i>-1?'💔 Rimosso':'❤️ Salvato'); renderResults();
}

function openMaps(lat,lng){window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,'_blank')}
function getNearby(){navigate('search');getNearby()}

$('search-input').addEventListener('input',e=>{
  const q=e.target.value.trim();
  if(q.length>2) searchAPI(q);
  else if(!q) getNearby();
});
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6wAI6R6WztfmYzimz0wFew_ItgzPc-QU&libraries=places&callback=initMap&language=it&region=IT"></script>
</body>
</html>
