              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');

    return !!(window.parent && window.parent !== window);

      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;

      sendEvent('game_ready', {
        frame_count: frameCount,

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070114" />
<title>Orbo — Trova il tuo posto unico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05030a;
    --violet:#8b5cf6;
    --violet-2:#7c3aed;
    --violet-3:#4c1d95;
    --pink:#ec4899;
    --glass:rgba(255,255,255,.06);
    --stroke:rgba(255,255,255,.10);
    --text-dim:rgba(255,255,255,.68);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:white;
    font-family:"Plus Jakarta Sans", system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none}
  button{font-family:inherit}

  /* Topbar */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:60;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    background:linear-gradient(to bottom, rgba(5,3,10,.85), rgba(5,3,10,.35) 60%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom:1px solid var(--stroke);
  }
  .logo{display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none}
  .logo svg{width:28px; height:28px; display:block; filter:drop-shadow(0 4px 16px rgba(124,58,237,.45))}
  .logo span{font-weight:800; font-size:22px; letter-spacing:-.5px}
  .top-actions{display:flex; gap:8px}
  .icon-btn{
    width:38px; height:38px; display:grid; place-items:center; border-radius:12px;
    background:var(--glass); border:1px solid var(--stroke); color:white;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); cursor:pointer; transition:.2s;
  }
  .icon-btn:hover{transform:translateY(-1px); background:rgba(255,255,255,.10)}
  .icon-btn.active{background:rgba(236,72,153,.18); border-color:rgba(236,72,153,.35); color:#f9a8d4}

  /* Hero */
  .hero{
    position:relative; min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:120px 20px 80px;
    overflow:hidden; isolation:isolate;
  }
  .hero-bg{
    position:absolute; inset:-20% -10% 0;
    background:
      radial-gradient(900px 520px at 50% -5%, rgba(139,92,246,.55), transparent 60%),
      radial-gradient(700px 420px at 85% 10%, rgba(236,72,153,.28), transparent 60%),
      radial-gradient(600px 380px at 15% 5%, rgba(59,130,246,.25), transparent 60%),
      linear-gradient(180deg, #1b0d3f 0%, #0b0618 45%, #05030a 75%);
    z-index:-2;
  }
  .hero::after{
    content:""; position:absolute; inset:0; z-index:-1;
    background: radial-gradient(1200px 800px at 50% 120%, rgba(0,0,0,.6), transparent 50%);
    pointer-events:none;
  }

  .orbit-wrap{position:relative; width:320px; height:320px; margin:0 auto 36px}
  @media (max-width:480px){ .orbit-wrap{width:270px; height:270px} }
  .center-orb{
    position:absolute; top:50%; left:50%; width:124px; height:124px; transform:translate(-50%,-50%);
    border-radius:50%;
    background: radial-gradient(circle at 30% 25%, #e9d5ff 0%, #c4b5fd 18%, #8b5cf6 45%, #5b21b6 75%);
    box-shadow: 0 0 70px rgba(124,58,237,.55), inset 0 0 30px rgba(255,255,255,.25), inset 0 -20px 40px rgba(0,0,0,.25);
    filter:saturate(1.1);
  }
  .center-orb::after{
    content:""; position:absolute; inset:-18px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(139,92,246,.35), transparent 70%);
    filter:blur(12px); z-index:-1;
  }
  .orbit{
    position:absolute; inset:0; border-radius:50%; border:1px solid rgba(255,255,255,.09);
    animation:spin linear infinite;
  }
  .orbit-2{inset:-38px; border-style:dashed; border-color:rgba(255,255,255,.12); animation-duration:34s; animation-direction:reverse}
  .orbit-3{inset:-78px; border-color:rgba(255,255,255,.07); animation-duration:52s}
  .orbit-1{animation-duration:22s}
  @keyframes spin{to{transform:rotate(360deg)}}
  .emoji{
    --r:150px; --a:0deg;
    position:absolute; top:50%; left:50%; width:48px; height:48px; margin:-24px;
    display:grid; place-items:center; font-size:22px;
    background:rgba(13,6,30,.55); border:1px solid var(--stroke); border-radius:50%;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    transform: rotate(var(--a)) translateX(var(--r)) rotate(calc(-1 * var(--a)));
  }
  .orbit-1 .emoji{--r:150px}
  .orbit-2 .emoji{--r:188px}
  .orbit-3 .emoji{--r:232px}
  @media (max-width:480px){
    .orbit-1 .emoji{--r:128px}
    .orbit-2 .emoji{--r:162px}
    .orbit-3 .emoji{--r:200px}
    .emoji{width:44px; height:44px; margin:-22px; font-size:20px}
  }

  h1{
    font-size:clamp(36px, 6vw, 64px); line-height:1.04; letter-spacing:-1.2px; margin:8px 0 14px; font-weight:800;
  }
  .grad{
    background:linear-gradient(135deg, #fff 10%, #e9d5ff 35%, #c4b5fd 55%, #8b5cf6 85%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{max-width:620px; margin:0 auto 28px; color:var(--text-dim); font-size:clamp(15px,2.2vw,18px)}
  .cta{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
  .btn{
    padding:14px 22px; border-radius:14px; border:1px solid transparent; font-weight:700; font-size:15px;
    cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:9px;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--violet), var(--violet-2));
    box-shadow:0 10px 28px rgba(124,58,237,.38), inset 0 1px 0 rgba(255,255,255,.18);
    color:white;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 16px 36px rgba(124,58,237,.48)}
  .btn-ghost{
    background:var(--glass); border-color:var(--stroke); color:white; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .btn-ghost:hover{background:rgba(255,255,255,.10)}

  /* Search View */
  .search{
    position:fixed; inset:0; z-index:50; display:none; background:#05030a;
  }
  .search.active{display:block}
  #map{position:absolute; inset:0; width:100%; height:100%;}
  .map-overlay{
    position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, rgba(5,3,10,.15) 0%, rgba(5,3,10,.6) 70%, rgba(5,3,10,.9) 100%);
  }

  .results{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    max-height:72vh; display:flex; flex-direction:column;
    background:linear-gradient(to top, rgba(7,3,18,.96) 60%, rgba(7,3,18,.75));
    backdrop-filter:blur(22px) saturate(1.2); -webkit-backdrop-filter:blur(22px) saturate(1.2);
    border-top:1px solid var(--stroke); border-radius:28px 28px 0 0; box-shadow:0 -20px 60px rgba(0,0,0,.5);
  }
  .handle{width:44px; height:5px; background:rgba(255,255,255,.18); border-radius:3px; margin:10px auto 6px}
  .panel-head{padding:4px 16px 8px}
  .status{font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:8px}
  .dot{width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 10px rgba(34,197,94,.6)}
  .categories{display:flex; gap:8px; overflow-x:auto; padding:12px 14px 4px; scrollbar-width:none}
  .categories::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; padding:10px 14px; border-radius:12px; font-weight:600; font-size:14px; cursor:pointer; white-space:nowrap;
    background:var(--glass); border:1px solid var(--stroke); color:rgba(255,255,255,.85); transition:.18s;
  }
  .chip.active{background:linear-gradient(135deg, var(--violet), var(--violet-2)); border-color:transparent; color:white; box-shadow:0 6px 18px rgba(124,58,237,.3)}
  .list{
    overflow:auto; padding:10px 14px 92px; display:grid; gap:12px;
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  @media (max-width:860px){ .list{grid-template-columns:1fr} }

  .card{
    display:flex; gap:12px; padding:12px; border-radius:18px; cursor:pointer;
    background:rgba(255,255,255,.04); border:1px solid var(--stroke);
    transition:.18s; align-items:center;
  }
  .card:hover{transform:translateY(-2px); background:rgba(255,255,255,.07); border-color:rgba(139,92,246,.45)}
  .thumb{
    width:84px; height:84px; border-radius:14px; flex:0 0 84px; overflow:hidden;
    background:#140a29; border:1px solid rgba(255,255,255,.06); display:grid; place-items:center; font-size:30px;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .info{flex:1; min-width:0}
  .name{font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .meta{display:flex; align-items:center; gap:10px; margin:4px 0 6px; color:var(--text-dim); font-size:12.5px}
  .rate{display:inline-flex; align-items:center; gap:4px; color:#fbbf24; font-weight:700}
  .addr{font-size:12.5px; color:rgba(255,255,255,.55); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .open{font-size:11.5px; padding:3px 8px; border-radius:999px; background:rgba(34,197,94,.12); color:#86efac; border:1px solid rgba(34,197,94,.22)}
  .open.closed{background:rgba(239,68,68,.12); color:#fca5a5; border-color:rgba(239,68,68,.22)}
  .actions{display:flex; flex-direction:column; gap:8px}
  .fav{
    width:36px; height:36px; display:grid; place-items:center; border-radius:10px; cursor:pointer;
    background:rgba(255,255,255,.06); border:1px solid var(--stroke); color:rgba(255,255,255,.75); transition:.18s;
  }
  .fav.active{background:rgba(236,72,153,.18); border-color:rgba(236,72,153,.35); color:#f9a8d4}
  .fav:hover{transform:scale(1.05)}

  .empty, .loading{padding:28px; text-align:center; color:var(--text-dim)}
  .skeleton{height:108px; border-radius:18px; background:linear-gradient(90deg, rgba(255,255,255,.05), rgba(255,255,255,.09), rgba(255,255,255,.05)); background-size:200% 100%; animation:shimmer 1.2s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Desktop layout */
  @media (min-width:1024px){
    .results{
      top:88px; right:22px; bottom:22px; left:auto; width:440px; max-height:none;
      border-radius:22px; border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(10,5,24,.85), rgba(7,3,18,.85));
    }
    .list{padding-bottom:16px}
  }

  /* Bottom nav mobile */
  .bottom-nav{
    position:fixed; bottom:12px; left:50%; transform:translateX(-50%); z-index:65;
    display:none; gap:8px; padding:8px; border-radius:16px;
    background:rgba(8,4,20,.7); border:1px solid var(--stroke); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    box-shadow:0 10px 30px rgba(0,0,0,.45);
  }
  .bottom-nav button{
    padding:10px 14px; border-radius:12px; border:1px solid transparent; background:transparent; color:white; font-weight:600; display:flex; align-items:center; gap:8px; cursor:pointer
  }
  .bottom-nav button.active{background:linear-gradient(135deg, var(--violet), var(--violet-2)); border-color:transparent}
  @media (max-width:1023px){ .bottom-nav{display:flex} }
</style>

<script>
let map, placesService, infoWindow, userPos=null;
let markers=[]; let currentPlaces=[]; let currentType='restaurant';
let showingFavs=false;
let favorites = JSON.parse(localStorage.getItem('orbo_favs') || '[]');
const $ = s => document.querySelector(s);
const resultsEl = $('#results');
const statusText = $('#statusText');
const btnFavs = $('#btnFavs');

const typeEmoji = {
  restaurant:'🍝', cafe:'☕', bakery:'🥐', ice_cream_shop:'🍦'
};

function setStatus(t){ statusText.textContent = t; }

function showHero(){
  $('#hero').style.display='flex';
  $('#searchView').classList.remove('active');
  $('#searchView').setAttribute('aria-hidden','true');
  showingFavs=false; btnFavs.classList.remove('active');
  $('#navHome').classList.add('active'); $('#navSearch').classList.remove('active');
}
function showSearch(){
  $('#hero').style.display='none';
  $('#searchView').classList.add('active');
  $('#searchView').setAttribute('aria-hidden','false');
  $('#navHome').classList.remove('active'); $('#navSearch').classList.add('active');
  setTimeout(()=>google.maps.event.trigger(map,'resize'), 200);
}

function clearMarkers(){ markers.forEach(m=>m.setMap(null)); markers=[]; }

function renderSkeleton(){
  resultsEl.innerHTML = Array(4).fill(0).map(()=>`<div class="skeleton"></div>`).join('');
}

function placeCardHTML(p){
  const isFav = favorites.some(f=>f.place_id===p.place_id);
  const photo = p.photo || (p.photos && p.photos[0] && p.photos[0].getUrl({maxWidth:400, maxHeight:400}));
  const rating = p.rating ? p.rating.toFixed(1) : '—';
  const total = p.user_ratings_total ? `(${p.user_ratings_total})` : '';
  const open = p.opening_hours ? (p.opening_hours.isOpen() ? '<span class="open">Aperto</span>' : '<span class="open closed">Chiuso</span>') : '';
  const addr = p.vicinity || p.formatted_address || '';
  return `
  <article class="card" data-id="${p.place_id}">
    <div class="thumb">${photo ? `<img loading="lazy" src="${photo}" alt="${p.name}">` : `<span>${typeEmoji[currentType]||'📍'}</span>`}</div>
    <div class="info">
      <div class="name">${p.name}</div>
      <div class="meta">
        <span class="rate">★ ${rating}</span>
        <span>${total}</span>
        ${open}
      </div>
      <div class="addr">${addr}</div>
    </div>
    <div class="actions">
      <button class="fav ${isFav?'active':''}" data-id="${p.place_id}" aria-label="Preferito">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-6.7-4.3-9.3-7.1A5.5 5.5 0 0 1 12 5.5a5.5 5.5 0 0 1 9.3 8.4C18.7 16.7 12 21 12 21z"/></svg>
      </button>
    </div>
  </article>`;
}

function renderPlaces(places){
  currentPlaces = places;
  clearMarkers();
  if(!places || !places.length){
    resultsEl.innerHTML = `<div class="empty">Nessun luogo trovato qui vicino.<br><span style="opacity:.7">Prova un'altra categoria.</span></div>`;
    setStatus('Nessun risultato');
    return;
  }
  resultsEl.innerHTML = places.map(renderPlacesCard => placeCardHTML(renderPlacesCard)).join('');
  const bounds = new google.maps.LatLngBounds();
  places.forEach((p,i)=>{
    const m = new google.maps.Marker({
      position:p.geometry.location, map,
      title:p.name,
      icon:{ path:google.maps.SymbolPath.CIRCLE, scale:8, fillColor:'#8b5cf6', fillOpacity:1, strokeColor:'#ffffff', strokeWeight:2 }
    });
    m.addListener('click', ()=>{
      infoWindow.setContent(`<div style="color:#111; font-weight:700">${p.name}</div><div style="color:#444; font-size:12px">${p.vicinity||''}</div>`);
      infoWindow.open(map,m);
      highlightCard(p.place_id);
    });
    markers.push(m);
    bounds.extend(p.geometry.location);
  });
  if(userPos) bounds.extend(userPos);
  map.fitBounds(bounds, 80);
  setStatus(`${places.length} risultati • ${currentType}`);
}

function highlightCard(id){
  document.querySelectorAll('.card').forEach(c=>c.style.borderColor = c.dataset.id===id ? 'rgba(139,92,246,.8)' : 'rgba(255,255,255,.1)');
}

function saveFavs(){ localStorage.setItem('orbo_favs', JSON.stringify(favorites)); }

function toggleFavById(id){
  const src = currentPlaces.find(p=>p.place_id===id) || favorites.find(f=>f.place_id===id);
  if(!src) return;
  const idx = favorites.findIndex(f=>f.place_id===id);
  if(idx>-1){ favorites.splice(idx,1); }
  else{
    const photo = src.photo || (src.photos && src.photos[0] && src.photos[0].getUrl({maxWidth:400}));
    favorites.push({
      place_id: src.place_id,
      name: src.name,
      vicinity: src.vicinity || src.formatted_address || '',
      rating: src.rating || 0,
      user_ratings_total: src.user_ratings_total || 0,
      photo: photo || '',
      lat: src.geometry?.location?.lat() || src.lat,
      lng: src.geometry?.location?.lng() || src.lng,
      opening: src.opening_hours ? src.opening_hours.isOpen() : null
    });
  }
  saveFavs();
  // update button UI
  document.querySelectorAll(`.fav[data-id="${id}"]`).forEach(btn=>{
    const active = favorites.some(f=>f.place_id===id);
    btn.classList.toggle('active', active);
    btn.querySelector('svg').setAttribute('fill', active ? 'currentColor' : 'none');
  });
}

function renderFavs(){
  showingFavs = true; btnFavs.classList.add('active');
  showSearch(); clearMarkers(); setStatus('Preferiti');
  if(!favorites.length){
    resultsEl.innerHTML = `<div class="empty">Ancora nessun preferito.<br><span style="opacity:.7">Tocca il cuore sui luoghi per salvarli.</span></div>`;
    return;
  }
  // map favorites to places-like objects for rendering
  const favPlaces = favorites.map(f=>({
    place_id:f.place_id, name:f.name, vicinity:f.vicinity, rating:f.rating, user_ratings_total:f.user_ratings_total,
    photo:f.photo, geometry:{location:new google.maps.LatLng(f.lat, f.lng)}, opening_hours: f.opening!=null ? {isOpen:()=>f.opening} : null
  }));
  currentPlaces = favPlaces;
  resultsEl.innerHTML = favPlaces.map(p=>placeCardHTML(p)).join('');
  const bounds = new google.maps.LatLngBounds();
  favPlaces.forEach(p=>{
    const m = new google.maps.Marker({position:p.geometry.location, map, title:p.name,
      icon:{ path:google.maps.SymbolPath.CIRCLE, scale:8, fillColor:'#ec4899', fillOpacity:1, strokeColor:'#fff', strokeWeight:2 }});
    markers.push(m); bounds.extend(p.geometry.location);
  });
  if(favPlaces.length) map.fitBounds(bounds, 80);
}

function searchNearby(){
  if(!placesService || !userPos){ setStatus('Attivazione mappa…'); return; }
  renderSkeleton(); setStatus('Cerco nei dintorni…');
  const req = { location:userPos, radius:1800, type:currentType };
  placesService.nearbySearch(req, (results, status)=>{
    if(status !== google.maps.places.PlacesServiceStatus.OK){
      resultsEl.innerHTML = `<div class="empty">Impossibile caricare i luoghi.<br><span style="opacity:.7">${status}</span></div>`;
      setStatus('Errore');
      return;
    }
    // enrich with photos url already via getUrl in card
    renderPlaces(results.slice(0,20));
  });
}

function getLocationAndSearch(){
  showSearch();
  setStatus('Localizzazione…');
  renderSkeleton();
  if(!navigator.geolocation){
    userPos = {lat:45.4642, lng:9.1900}; // Milano fallback
    map.setCenter(userPos); searchNearby(); return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    userPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    map.setCenter(userPos);
    new google.maps.Marker({position:userPos, map, icon:{path:google.maps.SymbolPath.CIRCLE, scale:6, fillColor:'#22c55e', fillOpacity:1, strokeColor:'#fff', strokeWeight:2}, title:'Tu sei qui'});
    searchNearby();
  }, err=>{
    userPos = {lat:45.4642, lng:9.1900};
    map.setCenter(userPos); searchNearby();
    setStatus('Posizione non disponibile — mostro Milano');
  }, {enableHighAccuracy:true, timeout:8000});
}

// Events
document.addEventListener('DOMContentLoaded', ()=>{
  $('#logo').onclick = showHero;
  $('#btnNearby').onclick = getLocationAndSearch;
  $('#btnExplore').onclick = getLocationAndSearch;
  $('#navHome').onclick = showHero;
  $('#navSearch').onclick = ()=>{ showSearch(); if(!userPos) getLocationAndSearch(); };
  btnFavs.onclick = ()=> showingFavs ? (showingFavs=false, btnFavs.classList.remove('active'), searchNearby()) : renderFavs();

  $('#cats').addEventListener('click', e=>{
    const btn = e.target.closest('.chip'); if(!btn) return;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active'); currentType = btn.dataset.type; showingFavs=false; btnFavs.classList.remove('active');
    if(userPos) searchNearby(); else getLocationAndSearch();
  });

  resultsEl.addEventListener('click', e=>{
    const fav = e.target.closest('.fav');
    if(fav){ e.stopPropagation(); toggleFavById(fav.dataset.id); return; }
    const card = e.target.closest('.card'); if(!card) return;
    const id = card.dataset.id;
    const p = currentPlaces.find(x=>x.place_id===id); if(!p) return;
    map.panTo(p.geometry.location); map.setZoom(17);
    infoWindow.setContent(`<div style="color:#111;font-weight:700">${p.name}</div><div style="color:#444;font-size:12px">${p.vicinity||''}</div>`);
    const m = markers.find((_,i)=>currentPlaces[i]?.place_id===id); if(m) infoWindow.open(map,m);
    highlightCard(id);
  });
});

// Google Maps init
window.initMap = function(){
  const mapStyles = [
    {elementType:'geometry', stylers:[{color:'#0b0718'}]},
    {elementType:'labels.text.fill', stylers:[{color:'#9b8ab7'}]},
    {elementType:'labels.text.stroke', stylers:[{color:'#0b0718'}]},
    {featureType:'road', elementType:'geometry', stylers:[{color:'#1a1031'}]},
    {featureType:'road', elementType:'geometry.stroke', stylers:[{color:'#1a1031'}]},
    {featureType:'water', elementType:'geometry', stylers:[{color:'#070212'}]},
    {featureType:'poi', stylers:[{visibility:'off'}]},
    {featureType:'transit', stylers:[{visibility:'off'}]},
  ];
  map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:45.4642,lng:9.19}, zoom:14, disableDefaultUI:true, zoomControl:true, styles:mapStyles, backgroundColor:'#05030a'
  });
  placesService = new google.maps.places.PlacesService(map);
  infoWindow = new google.maps.InfoWindow();
  setStatus('Pronto');
};
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6wAI6R6WztfmYzimz0wFew_ItgzPc-QU&libraries=places&callback=initMap"></script>
</body>
</html>
