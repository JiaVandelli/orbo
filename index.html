<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orbo — Il gusto ti orbita</title>
<meta name="description" content="Orbo: trova il locale perfetto vicino a te. Cerca per atmosfera, cucina o occasione.">
<meta property="og:title" content="Orbo — Il gusto ti orbita">
<meta property="og:description" content="Trova il locale perfetto, a portata di tap.">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://maps.googleapis.com">
<link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/orbo.css">
<script src="sdk/playables.js"></script>
<script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="cursor-glow" aria-hidden="true"></div>
<div class="maps-loading" id="maps-loading" aria-hidden="true"><div class="maps-spinner"></div></div>

<header class="topbar" role="banner">
  <!--... header invariato... -->
</header>

<main role="main">
  <!-- HOME invariata -->

  <!-- ══ SEARCH ═════════════════════════════════════ -->
  <section class="view" id="view-search" aria-label="Ricerca locali">
    <div class="view-inner">
      <div class="view-header">
        <h2 class="view-title">🔍 Cerca</h2>
        <button class="back-btn" onclick="navigate('home')" aria-label="Torna alla home">← Home</button>
      </div>
      <div class="history-row" id="history-row" aria-label="Ricerche recenti"></div>
      <div class="search-bar-wrap">
        <div class="search-bar" role="search">
          <span style="font-size:1.2rem" aria-hidden="true">🔍</span>
          <input id="search-input" placeholder="Città, tipo di locale o piatto..." autocomplete="off" aria-label="Cerca locali" type="search">
          <div class="search-bar-actions">
            <button class="sb-btn" id="voice-btn" onclick="startVoice()" aria-label="Cerca con la voce">🎤</button>
            <button class="sb-btn" id="search-clear" style="display:none" onclick="clearSearch()" aria-label="Cancella ricerca">✕</button>
          </div>
        </div>
      </div>

      <!-- 👇 AGGIUNTA QUI -->
      <div id="vibe-filters" class="vibe-panel"></div>

      <div class="chips" id="chips" role="group" aria-label="Filtra per categoria"></div>
      <div class="results-toolbar">
        <p class="results-count" id="results-count" aria-live="polite"></p>
      </div>
      <div id="results-list" role="list"></div>
      <div class="empty-state" id="empty-state" aria-live="polite">
        <div class="empty-icon" aria-hidden="true">🍽️</div>
        <p>Cerca una città o un tipo di locale,<br>oppure clicca <strong style="color:#FFB347">Vicino a me</strong></p>
      </div>
    </div>
  </section>
</main>

<!-- resto invariato -->
<div class="modal" id="detail-modal" role="dialog" aria-modal="true" aria-label="Dettagli locale" onclick="if(event.target===this)closeModal()">...</div>
<div id="gmap" aria-hidden="true"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="js/core.js"></script>
<script src="js/maps.js"></script>
<script src="js/ui.js"></script>
<script src="js/news.js?v=6"></script>
</body>
</html>
