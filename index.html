<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Orbo — Il gusto ti orbita</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,sans-serif;background:#0D0417;color:#E9D5FF;min-height:100vh;overflow-x:hidden}
    button,input{font:inherit;border:0;background:none;cursor:pointer}
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
   .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(13,4,23,0.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(168,85,247,0.15)}
   .topbar-logo{height:42px;width:42px;filter:drop-shadow(0 0 12px rgba(168,85,247,0.7))}
   .topbar-slogan{flex:1;font-family:'Arial Black',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;background:linear-gradient(90deg,#A855F7,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
   .view{display:none;position:relative;z-index:1;padding:20px}
   .view.active{display:block}
   .hero{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px}
   .btn-primary{background:linear-gradient(135deg,#A855F7,#22D3EE);padding:16px 32px;border-radius:999px;font-weight:900;color:#0D0417}
   .btn-ghost{border:1.5px solid rgba(168,85,247,0.4);padding:16px 32px;border-radius:999px;font-weight:900;color:#E9D5FF}
   .search-box{width:100%;max-width:600px;margin:20px auto;position:relative}
   .search-box input{width:100%;padding:16px 20px;background:rgba(26,11,46,0.9);border:1.5px solid rgba(168,85,247,0.3);border-radius:16px;color:#E9D5FF;font-size:16px;outline:none}
   .search-box input:focus{border-color:#A855F7;box-shadow:0 0 0 3px rgba(168,85,247,0.2)}
   .filters{display:flex;gap:8px;flex-wrap:wrap;max-width:600px;margin:0 auto 16px}
   .chip{padding:8px 14px;border-radius:999px;border:1px solid rgba(168,85,247,0.3);font-size:13px;font-weight:600;opacity:.8}
   .chip.active{background:rgba(168,85,247,0.25);border-color:#A855F7;opacity:1}
   .result-card{background:linear-gradient(135deg,rgba(45,27,78,0.85),rgba(20,8,38,0.85));border:1px solid rgba(168,85,247,0.2);border-radius:16px;padding:14px;margin-bottom:12px;display:flex;gap:14px;align-items:center}
   .result-card img{width:80px;height:80px;border-radius:12px;object-fit:cover;background:#2d1b4e}
   .rc-name{font-weight:800;font-size:17px;margin-bottom:4px}
   .rc-meta{font-size:13px;opacity:.7;display:flex;gap:10px;flex-wrap:wrap}
   .badge{padding:2px 8px;border-radius:6px;background:rgba(34,211,238,0.15);color:#22D3EE;font-size:11px;font-weight:700}
   .skeleton{animation:pulse 1.5s infinite;background:rgba(168,85,247,0.1);border-radius:12px;height:108px;margin-bottom:12px}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
   .pac-container{background:#1A0B2E!important;border:1px solid rgba(168,85,247,0.4)!important;border-radius:12px!important;margin-top:4px;z-index:9999!important}
   .pac-item{color:#E9D5FF!important;padding:10px!important;border-top:1px solid rgba(168,85,247,0.1)!important;padding-left:16px!important}
   .pac-item:hover{background:rgba(168,85,247,0.2)!important}
   .pac-item-query{color:#22D3EE!important}
   .pac-icon{background-image:none!important;width:0!important}
   .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#059669;padding:12px 20px;border-radius:8px;color:#fff;z-index:9999;display:none}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <header class="topbar">
    <svg class="topbar-logo" id="logo-btn" viewBox="0 0 100 100"><polygon points="50,15 75,30 75,60 50,75 25,60 25,30" fill="url(#g)"/><defs><linearGradient id="g"><stop stop-color="#A855F7"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs></svg>
    <span class="topbar-slogan">IL GUSTO TI ORBITA</span>
  </header>

  <main>
    <section class="view active" id="view-home">
      <div class="hero">
        <h1 style="font-size:32px;background:linear-gradient(180deg,#E9D5FF,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Il locale perfetto,<br>a portata di tap</h1>
        <button class="btn-primary" onclick="navigate('search')">Inizia la ricerca →</button>
        <button class="btn-ghost" onclick="doNearby()">📍 Vicino a me</button>
      </div>
    </section>

    <section class="view" id="view-search">
      <div class="search-box">
        <input id="search-input" placeholder="Città, poi pizza, sushi, cocktail..." autocomplete="off">
      </div>
      <div class="filters" id="filters">
        <button class="chip" data-price="1">€</button>
        <button class="chip" data-price="2">€€</button>
        <button class="chip" data-price="3">€€€</button>
        <button class="chip" data-price="4">€€€€</button>
        <button class="chip" id="open-now">Aperto ora</button>
      </div>
      <div id="results-list"></div>
    </section>
  </main>

  <div id="gmap" style="display:none"></div>
  <div id="toast" class="toast"></div>

  <script>
    (function(){const c=document.getElementById('bg-canvas'),x=c.getContext('2d');let W,H;function r(){W=c.width=innerWidth;H=c.height=innerHeight}r();addEventListener('resize',r);const s=Array(40).fill().map(()=>({x:Math.random()*W,y:Math.random()*H,a:Math.random()}));(function d(){x.clearRect(0,0,W,H);s.forEach(p=>{p.a+=.002;if(p.a>1)p.a=0;x.beginPath();x.arc(p.x,p.y,1.2,0,7);x.fillStyle=`rgba(180,150,255,${p.a*.4})`;x.fill()});requestAnimationFrame(d)})()})();

let map,placesService,autocomplete,userLoc=null,currentLocation=null,lastQuery='',searchTimeout;
let filters = {price:null, openNow:false};
const $=id=>document.getElementById(id);
const navigate=v=>document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active',s.id==='view-'+v));

function safeLocation(){
  return currentLocation || (userLoc? new google.maps.LatLng(userLoc.lat,userLoc.lng) : new google.maps.LatLng(44.546, 10.946));
}

function initMap(){
  map=new google.maps.Map($('gmap'),{center:{lat:44.546, lng:10.946},zoom:13});
  placesService=new google.maps.places.PlacesService(map);

  const emiliaBounds = new google.maps.LatLngBounds({lat:43.7,lng:9.2},{lat:45.1,lng:12.8});
  autocomplete = new google.maps.places.Autocomplete($('search-input'), {
    componentRestrictions:{country:'it'},
    bounds: emiliaBounds,
    strictBounds:false,
    fields:['geometry','name','formatted_address','place_id','types']
  });

  autocomplete.addListener('place_changed', ()=>{
    const place = autocomplete.getPlace();
    if(!place.geometry) return;
    currentLocation = place.geometry.location;
    map.setCenter(currentLocation);
    $('search-input').blur();
    if(place.types?.includes('locality') || place.types?.includes('administrative_area_level_3')){
      cercaLocali('ristoranti', currentLocation, place.name);
    } else {
      mostraSingoloPlace(place);
    }
  });

  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>{
    userLoc={lat:p.coords.latitude,lng:p.coords.longitude};
    currentLocation = new google.maps.LatLng(userLoc.lat,userLoc.lng);
  },()=>{}, {enableHighAccuracy:true, timeout:5000});
}

function distanza(lat1,lng1,lat2,lng2){
  if(!lat2) return null;
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1)+' km';
}

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display = 'none' }, 3000);
}

function showSkeleton(){
  $('results-list').innerHTML = Array(4).fill('<div class="skeleton"></div>').join('');
}

function cercaLocali(query, location, cityName){
  const loc = location || safeLocation();
  if(!loc) return;
  const cacheKey = `${query}-${loc.lat().toFixed(3)}-${filters.price}-${filters.openNow}`;
  const cached = sessionStorage.getItem(cacheKey);
  if(cached && Date.now() - JSON.parse(cached).t < 300000){
    renderResults(JSON.parse(cached).data, cityName);
    return;
  }
  if(query === lastQuery) return;
  lastQuery = query;
  showSkeleton();

  const request = { location:loc, radius:5000, keyword:query, type:'restaurant' };
  placesService.nearbySearch(request, (results,status)=>{
    if(status!=='OK' ||!results.length){
      $('results-list').innerHTML=`<div style="text-align:center;padding:40px">Nessun risultato per ${query}</div>`;
      return;
    }
    let filtered = results;
    if(filters.price) filtered = filtered.filter(r=>r.price_level==filters.price);
    if(filters.openNow) filtered = filtered.filter(r=>r.opening_hours?.open_now);
    sessionStorage.setItem(cacheKey, JSON.stringify({t:Date.now(), data:filtered}));
    renderResults(filtered, cityName);
  });
}

function renderResults(results, cityName){
  $('results-list').innerHTML = results.slice(0,15).map(v=>{
    const photo = v.photos?.[0]?.getUrl({maxWidth:400}) || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400';
    const dist = userLoc? distanza(userLoc.lat,userLoc.lng,v.geometry.location.lat(),v.geometry.location.lng()) : '';
    const aperto = v.opening_hours? (v.opening_hours.open_now? 'Aperto' : 'Chiuso') : '';
    const price = '€'.repeat(v.price_level||1);
    return `<div class="result-card" onclick="location.href='https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.name)}&query_place_id=${v.place_id}'">
      <img src="${photo}" alt="" loading="lazy">
      <div style="flex:1">
        <div class="rc-name">${v.name}</div>
        <div class="rc-meta">
          <span>⭐ ${v.rating||'–'}</span>
          <span>${price}</span>
          ${dist?`<span>${dist}</span>`:''}
          ${aperto?`<span class="badge">${aperto}</span>`:''}
        </div>
        <div class="rc-meta" style="opacity:.5;margin-top:4px">${v.vicinity||''}</div>
      </div>
    </div>`;
  }).join('');
}

function mostraSingoloPlace(place){
  showSkeleton();
  placesService.getDetails({placeId:place.place_id, fields:['name','photos','formatted_address','geometry','rating','price_level','opening_hours','vicinity']}, (p)=>{
    renderResults([p], '');
  });
}

window.doNearby = function(){
  navigate('search');
  const loc = safeLocation();
  currentLocation = loc;
  cercaLocali('ristoranti', loc, 'qui vicino');
}

$('search-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const q = e.target.value.trim();
    if(q.length>2){
      $('search-input').blur();
      cercaLocali(q, safeLocation(), 'zona');
    }
  }
});

document.querySelectorAll('.chip[data-price]').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.chip[data-price]').forEach(x=>x.classList.remove('active'));
    if(filters.price == b.dataset.price){filters.price=null}else{filters.price=Number(b.dataset.price);b.classList.add('active')}
    lastQuery='';
    const q = $('search-input').value.trim() || 'ristoranti';
    cercaLocali(q, safeLocation(), '');
  }
});
$('open-now').onclick=e=>{
  filters.openNow=!filters.openNow;
  e.target.classList.toggle('active');
  lastQuery='';
  const q = $('search-input').value.trim() || 'ristoranti';
  cercaLocali(q, safeLocation(), '');
};

$('logo-btn').onclick=()=>navigate('home');
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD4u7DkZz8wQ1wQ1JzZ1wQ1wQ1wQ&libraries=places&callback=initMap&language=it&region=IT"></script>
</body>
</html>
