<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbo - Il gusto ti orbita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo img {
            width: 40px;
            height: 40px;
        }
        .hero {
            text-align: center;
            padding: 80px 20px;
        }
        
        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #FF6600, #FF8533);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 40px;
        }
        
        .btn-primary {
            background: #FF6600;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: #FF8533;
            transform: translateY(-2px);
        }
        
        #map {
            height: 600px;
            width: 100%;
            border-radius: 16px;
            margin-top: 40px;
            display: none;
        }
        
        .category-filters {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
            display: none;
        }
        
        .category-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-btn.active {
            background: #FF6600;
            border-color: #FF6600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="OrboLogo.svg" alt="Orbo">
                <span style="font-size: 24px; font-weight: 700;">Orbo</span>
            </div>
        </header>
        
        <div class="hero" id="hero">
            <img src="OrboLogo.svg" alt="Orbo" style="width: 120px; height: 120px; margin-bottom: 24px;">
            <h1>Il gusto ti orbita</h1>
            <p>Trova i migliori ristoranti vicino a te</p>
            <button class="btn-primary" onclick="startSearch()">INIZIA LA RICERCA</button>
        </div>
        
        <div class="category-filters" id="filters">
            <button class="category-btn active" data-type="restaurant">Ristoranti</button>
            <button class="category-btn" data-type="cafe">Bar</button>
            <button class="category-btn" data-type="bakery">Pasticcerie</button>
            <button class="category-btn" data-type="ice_cream">Gelaterie</button>
        </div>
        
        <div id="map"></div>
    </div>
    
    <script>
        let map;
        let service;
        let markers = [];
        let userLocation;
        let searchTimeout;
        
        // TUA API KEY - GIÀ MESSA
        const API_KEY = "AIzaSyDgzLR7vP74d9N-Buj_1Lana3g8nBRWyEg";
        
        function startSearch() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('filters').style.display = 'flex';
            document.getElementById('map').style.display = 'block';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    initMap();
                }, () => {
                    userLocation = { lat: 44.698, lng: 10.631 }; // Reggio Emilia fallback
                    initMap();
                });
            } else {
                userLocation = { lat: 44.698, lng: 10.631 };
                initMap();
            }
        }
        
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: userLocation,
                zoom: 14,
                styles: [{ "elementType": "geometry", "stylers": [{ "color": "#212121" }] }]
            });
            
            service = new google.maps.places.PlacesService(map);
            
            // Marker utente
            new google.maps.Marker({
                position: userLocation,
                map: map,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: '#FF6600', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
            });
            
            searchPlaces('restaurant');
            setupFilters();
        }
        
        function searchPlaces(type) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                clearMarkers();
                
                const request = {
                    location: userLocation,
                    radius: 5000,
                    type: type === 'ice_cream' ? 'store' : type,
                    keyword: type === 'ice
'ice_cream' ? 'gelateria' : undefined
                };
                
                service.nearbySearch(request, (results, status) => {
                    if (status === google.maps.places.PlacesServiceStatus.OK) {
                        results.forEach(place => createMarker(place));
                    }
                });
            }, 300);
        }
        
        function createMarker(place) {
            const marker = new google.maps.Marker({
                position: place.geometry.location,
                map: map,
                title: place.name
            });
            
            const infowindow = new google.maps.InfoWindow({
                content: `<div style="color:#000"><b>${place.name}</b><br>${place.vicinity}</div>`
            });
            
            marker.addListener('click', () => infowindow.open(map, marker));
            markers.push(marker);
        }
        
        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }
        
        function setupFilters() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    searchPlaces(this.dataset.type);
                });
            });
        }
    </script>
    
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDgzLR7vP74d9N-Buj_1Lana3g8nBRWyEg&libraries=places&callback=initMap"></script>
</body>
</html>
