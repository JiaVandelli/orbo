<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orbo — Il gusto ti orbita</title>
<meta name="description" content="Orbo trova il locale perfetto vicino a te. Pizza, sushi, brunch — il gusto ti orbita.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Inter",system-ui,sans-serif;background:#0D0417;color:#E9D5FF;min-height:100vh;overflow-x:hidden}
button,input{font:inherit;border:0;background:none;cursor:pointer}
img{display:block;width:100%;height:100%;object-fit:cover}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(13,4,23,0.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(168,85,247,0.15)}
.topbar-logo{height:42px;width:42px;filter:drop-shadow(0 0 12px rgba(168,85,247,0.7))}
.topbar-slogan{flex:1;font-family:'Arial Black',sans-serif;font-size:15px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;background:linear-gradient(90deg,#A855F7,#22D3EE,#A855F7);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmerText 3s linear infinite}
@keyframes shimmerText{0%{background-position:0%}100%{background-position:200%}}
.view{display:none;position:relative;z-index:1}
.view.active{display:block;animation:fadeUp .32s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 48px;position:relative}
.btn-primary{background:linear-gradient(135deg,#A855F7,#22D3EE);padding:16px 38px;border-radius:999px;font-weight:900;color:#0D0417;text-transform:uppercase}
.btn-ghost{background:rgba(168,85,247,0.06);border:1.5px solid rgba(168,85,247,0.4);padding:16px 38px;border-radius:999px;font-weight:900;color:#E9D5FF;text-transform:uppercase}
.result-card{background:linear-gradient(135deg,rgba(45,27,78,0.85),rgba(20,8,38,0.85));border:1px solid rgba(168,85,247,0.18);border-radius:22px;overflow:hidden;margin-bottom:14px;display:grid;grid-template-columns:130px 1fr}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<header class="topbar">
  <svg class="topbar-logo" id="logo-btn" viewBox="0 0 100 100"><polygon points="50,15 75,30 75,60 50,75 25,60 25,30" fill="#A855F7"/></svg>
  <span class="topbar-slogan">Il gusto ti orbita</span>
  <button id="menu-btn">☰</button>
</header>

<main>
  <section class="view active" id="view-home">
    <div class="hero">
      <h1>Il locale perfetto,<br>a portata di tap</h1>
      <p>Cerca per atmosfera, cucina o occasione. <strong>Orbo ti porta dove vuoi essere.</strong></p>
      <div>
        <button class="btn-primary" onclick="navigate('search')">Inizia la ricerca →</button>
        <button class="btn-ghost" id="nearby-btn" onclick="doNearby()">📍 Vicino a me</button>
      </div>
    </div>
  </section>

  <section class="view" id="view-search">
    <div style="padding:24px">
      <h2>🔍 Cerca</h2>
      <input id="search-input" placeholder="Pizza, sushi..." style="width:100%;padding:14px;background:#1a0b2e;color:#fff;border-radius:12px;margin:12px 0">
      <div id="results-list"></div>
    </div>
  </section>
</main>

<div id="gmap" style="display:none"></div>

<script>
// CANVAS LEGGERO
(function(){const c=document.getElementById('bg-canvas'),x=c.getContext('2d');let W,H,s=[];function r(){W=c.width=innerWidth;H=c.height=innerHeight;s=[];for(let i=0;i<40;i++)s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1+.3,a:Math.random()})}r();addEventListener('resize',r);function d(){x.clearRect(0,0,W,H);s.forEach(p=>{p.a+=.002;if(p.a>1)p.a=0;x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=`rgba(200,180,255,${p.a*.5})`;x.fill()});requestAnimationFrame(d)}d()})();

let map,placesService,userLoc=null;
function $(id){return document.getElementById(id)}
function navigate(v){document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active',s.id==='view-'+v))}
function initMap(){map=new google.maps.Map($('gmap'),{center:{lat:44.4949,lng:11.3426},zoom:15});placesService=new google.maps.places.PlacesService(map);if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{userLoc={lat:p.coords.latitude,lng:p.coords.longitude}})}
function doNearby(){navigate('search');const loc=userLoc||map.getCenter();placesService.nearbySearch({location:loc,radius:2000,type:'restaurant'},(r,s)=>{if(s==='OK'){$('results-list').innerHTML=r.slice(0,5).map(v=>`<div class="result-card"><div style="padding:12px">${v.name}</div></div>`).join('')}})}
$('search-input').addEventListener('input',e=>{const q=e.target.value;if(q.length>2){placesService.textSearch({query:q,location:map.getCenter(),radius:5000},(r,s)=>{if(s==='OK'){$('results-list').innerHTML=r.slice(0,5).map(v=>`<div class="result-card"><div style="padding:12px">${v.name}</div></div>`).join('')}})}});
$('logo-btn').onclick=()=>navigate('home');
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6wAI6R6WztfmYzimz0wFew_ItgzPc-QU&libraries=places&callback=initMap&language=it&region=IT"></script>
</body>
</html>
