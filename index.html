  if (window.playablesSDK) return;

  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {

        eventName,
        JSON.stringify(p)

    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;

      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()

    originalRAF.call(window, onFrame);

        return originalRAF.call(window, function(timestamp) {

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Orbo – Il gusto ti orbita intorno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0713;
  --card:#151022;
  --violet:#7C3AED;
  --violet-light:#A78BFA;
  --orange:#FF7A1A;
  --amber:#FFB86B;
  --text:#F5F3FF;
  --muted:#9A93B2;
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
.app{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;background:var(--bg)}
header{
  position:sticky;top:0;z-index:50;height:60px;display:flex;align-items:center;gap:10px;
  padding:0 18px;background:rgba(21,16,34,.7);border-bottom:1px solid rgba(167,139,250,.08);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;letter-spacing:.2px}
.logo svg{width:28px;height:28px;flex:0 0 28px}
.hero{padding:26px 20px 16px;text-align:center;position:relative}
.hero h1{font-size:32px;line-height:1.1;font-weight:700;letter-spacing:-.2px}
.hero p{margin-top:8px;color:var(--muted);font-size:15px}
.hero-cta-wrap{position:relative;margin-top:22px;display:inline-block}
.orbit{position:absolute;width:112px;height:112px;left:50%;top:50%;transform:translate(-50%,-50%);animation:spin 24s linear infinite;pointer-events:none;will-change:transform}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.orbit i{position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;background:var(--violet);border-radius:50%;opacity:.55;box-shadow:0 0 10px rgba(124,58,237,.35)}
.orbit i:nth-child(1){transform:rotate(0deg) translateY(-52px)}
.orbit i:nth-child(2){transform:rotate(60deg) translateY(-52px)}
.orbit i:nth-child(3){transform:rotate(120deg) translateY(-52px)}
.orbit i:nth-child(4){transform:rotate(180deg) translateY(-52px)}
.orbit i:nth-child(5){transform:rotate(240deg) translateY(-52px)}
.orbit i:nth-child(6){transform:rotate(300deg) translateY(-52px)}
.btn-cta{
  position:relative;background:var(--orange);color:#0B0713;border:none;
  padding:16px 28px;border-radius:16px;font-weight:700;font-size:16px;
  display:inline-flex;align-items:center;gap:9px;cursor:pointer;
  box-shadow:0 10px 24px rgba(255,122,26,.22),0 2px 6px rgba(0,0,0,.4);
  transition:transform .12s ease,box-shadow .12s ease;user-select:none
}
.btn-cta:active{transform:translateY(1px) scale(.98);box-shadow:0 6px 16px rgba(255,122,26,.18)}
.btn-cta svg{width:20px;height:20px}
.chips{
  display:flex;gap:8px;padding:12px 16px 14px;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;border-bottom:1px solid rgba(167,139,250,.06)
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:9px 16px;border-radius:999px;border:1.5px solid rgba(124,58,237,.5);
  background:transparent;color:var(--violet-light);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .18s ease;white-space:nowrap;user-select:none
}
.chip.active{background:var(--orange);border-color:var(--orange);color:#0B0713;font-weight:600;box-shadow:0 4px 12px rgba(255,122,26,.22)}
#map{flex:1;min-height:320px;background:#07040d;position:relative}
.gm-style-cc,.gmnoprint{display:none!important}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;transform:translateY(110%);transition:transform .34s cubic-bezier(.2,.8,.2,1);max-width:560px;margin:0 auto;padding:0 12px;pointer-events:none}
.sheet.active{transform:translateY(0);pointer-events:auto}
.sheet-inner{background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.55),0 -2px 8px rgba(0,0,0,.4);border:1px solid rgba(167,139,250,.12);border-bottom:none;padding:14px 18px 22px}
.sheet-handle{width:38px;height:4px;background:rgba(154,147,178,.35);border-radius:2px;margin:4px auto 12px}
.sheet h3{font-size:19px;font-weight:700;line-height:1.25;color:var(--text)}
.place-meta{display:flex;align-items:center;gap:10px;margin-top:6px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.rating{display:flex;align-items:center;gap:6px}
.stars{display:flex;gap:2px}
#place-address{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.35}
.sheet-actions{display:flex;gap:10px;margin-top:16px}
.btn-primary{flex:1;background:var(--orange);color:#0B0713;border:none;padding:13px 16px;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 6px 16px rgba(255,122,26,.2)}
.btn-secondary{flex:0 0 auto;background:transparent;color:var(--violet-light);border:1.5px solid rgba(124,58,237,.6);padding:13px 18px;border-radius:14px;font-weight:600;font-size:15px;cursor:pointer}
.btn-secondary:disabled{opacity:.4}
.pill-open{color:var(--violet-light);font-weight:600}
@media (min-width:700px){
  .hero h1{font-size:36px}
  .sheet{padding:0 0}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo" aria-label="Orbo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="8" stroke="#F5F3FF" stroke-width="3"/>
        <ellipse cx="16" cy="16" rx="14" ry="6.5" stroke="#7C3AED" stroke-width="2.2" transform="rotate(-28 16 16)"/>
        <circle cx="26" cy="9" r="2" fill="#A78BFA"/>
      </svg>
      Orbo
    </div>
  </header>

  <section class="hero">
    <h1>Il gusto ti orbita intorno</h1>
    <p>Scopri ristoranti, bar e locali selezionati intorno a te.</p>
    <div class="hero-cta-wrap">
      <div class="orbit" aria-hidden="true"><i></i><i></i></div>
      <button id="nearMe" class="btn-cta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="4"/></svg>
        Vicino a me
      </button>
    </div>
  </section>

  <nav class="chips" id="chips">
    <button class="chip active" data-cat="Tutti">Tutti</button>
    <button class="chip" data-cat="Ristoranti">Ristoranti</button>
    <button class="chip" data-cat="Bar">Bar</button>
    <button class="chip" data-cat="Gelaterie">Gelaterie</button>
    <button class="chip" data-cat="Pizzerie">Pizzerie</button>
    <button class="chip" data-cat="Sushi">Sushi</button>
    <button class="chip" data-cat="Cocktail">Cocktail</button>
  </nav>

  <div id="map" role="application" aria-label="Mappa locali"></div>

  <div id="sheet" class="sheet">
    <div class="sheet-inner">
      <div class="sheet-handle"></div>
      <h3 id="place-name">Nome locale</h3>
      <div class="place-meta">
        <div id="place-rating" class="rating"></div>
        <span id="place-open" class="pill-open"></span>
      </div>
      <p id="place-address"></p>
      <div class="sheet-actions">
        <button id="btn-directions" class="btn-primary">Indicazioni</button>
        <button id="btn-call" class="btn-secondary">Chiama</button>
      </div>
    </div>
  </div>
</div>

<script>
let map, service, userPos=null, markers=[], activeMarker=null, currentPlace=null, activeCategory='Tutti';

const darkStyle=[
  {"elementType":"geometry","stylers":[{"color":"#0b0713"}]},
  {"elementType":"labels.icon","stylers":[{"visibility":"off"}]},
  {"elementType":"labels.text.fill","stylers":[{"color":"#9a93b2"}]},
  {"elementType":"labels.text.stroke","stylers":[{"color":"#0b0713"}]},
  {"featureType":"administrative","elementType":"geometry","stylers":[{"color":"#151022"}]},
  {"featureType":"poi","stylers":[{"visibility":"off"}]},
  {"featureType":"road","elementType":"geometry","stylers":[{"color":"#151022"}]},
  {"featureType":"road","elementType":"geometry.stroke","stylers":[{"color":"#1f1630"}]},
  {"featureType":"road.highway","elementType":"geometry","stylers":[{"color":"#1b1329"}]},
  {"featureType":"transit","stylers":[{"visibility":"off"}]},
  {"featureType":"water","elementType":"geometry","stylers":[{"color":"#07040d"}]},
  {"featureType":"water","elementType":"labels.text.fill","stylers":[{"color":"#5b5373"}]}
];

function markerSvg(color){
  return `<svg xmlns='http://www.w3.org/2000/svg' width='32' height='44' viewBox='0 0 32 44'><path fill='${color}' d='M16 0C7.2 0 0 7.2 0 16c0 8.5 12.2 23.7 15.3 27.4.4.5 1 .5 1.4 0C19.8 39.7 32 24.5 32 16 32 7.2 24.8 0 16 0z'/><circle cx='16' cy='16' r='7' fill='#0B0713'/></svg>`;
}
const iconViolet = {
  url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(markerSvg('#7C3AED')),
  scaledSize:new google.maps.Size(30,41), anchor:new google.maps.Point(15,41)
};
const iconOrange = {
  url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(markerSvg('#FF7A1A')),
  scaledSize:new google.maps.Size(34,46), anchor:new google.maps.Point(17,46)
};

window.initMap=function(){
  const rome={lat:41.9028,lng:12.4964};
  map=new google.maps.Map(document.getElementById('map'),{
    center:rome,zoom:15,disableDefaultUI:true,styles:darkStyle,gestureHandling:'greedy',clickableIcons:false,backgroundColor:'#0B0713'
  });
  service=new google.maps.places.PlacesService(map);
  map.addListener('dragstart',closeSheet);
  map.addListener('click',closeSheet);
  locateAndSearch();
}

function locateAndSearch(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setCenter(userPos);
      map.setZoom(15);
      new google.maps.Marker({position:userPos,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:'#A78BFA',fillOpacity:1,strokeColor:'#0B0713',strokeWeight:2}});
      searchPlaces(activeCategory);
    },()=>searchPlaces(activeCategory),{enableHighAccuracy:true,timeout:8000});
  }else{
    searchPlaces(activeCategory);
  }
}

function clearMarkers(){
  markers.forEach(m=>m.setMap(null));
  markers=[]; activeMarker=null;
}

function searchPlaces(cat){
  clearMarkers(); closeSheet();
  const loc=map.getCenter();
  let req={location:loc,radius:2000};
  switch(cat){
    case 'Tutti': req.keyword='ristorante bar pizzeria'; break;
    case 'Ristoranti': req.type='restaurant'; break;
    case 'Bar': req.type='bar'; break;
    case 'Gelaterie': req.keyword='gelateria'; break;
    case 'Pizzerie': req.keyword='pizzeria'; req.type='restaurant'; break;
    case 'Sushi': req.keyword='sushi'; break;
    case 'Cocktail': req.keyword='cocktail bar'; break;
  }
  service.nearbySearch(req,(results,status)=>{
    if(status===google.maps.places.PlacesServiceStatus.OK && results){
      results.slice(0,20).forEach(place=>createPlaceMarker(place));
    }
  });
}

function createPlaceMarker(place){
  const marker=new google.maps.Marker({
    map,position:place.geometry.location,title:place.name,icon:iconViolet
  });
  marker.placeId=place.place_id;
  marker.addListener('click',()=>showPlace(place,marker));
  markers.push(marker);
}

function resetActive(){
  if(activeMarker){activeMarker.setIcon(iconViolet); activeMarker.setZIndex(null);}
}

function showPlace(place,marker){
  resetActive();
  marker.setIcon(iconOrange); marker.setZIndex(999); activeMarker=marker; currentPlace=place;
  map.panTo(marker.getPosition());
  service.getDetails({placeId:place.place_id,fields:['name','formatted_address','formatted_phone_number','opening_hours','rating','user_ratings_total','geometry','vicinity']},(detail,status)=>{
    openSheet(status==='OK'?detail:place);
  });
}

function renderStars(rating,total){
  const r=Math.round(rating||0);
  let s='';
  for(let i=0;i<5;i++){
    s+=`<svg width="14" height="14" viewBox="0 0 24 24" fill="${i<r?'#FFB86B':'none'}" stroke="#FFB86B" stroke-width="2"><polygon points="12 2 15 9 22 9 16.5 13.5 18.5 20.5 12 16.5 5.5 20.5 7.5 13.5 2 9 9 9 12 2"/></svg>`;
  }
  return `<div class="stars">${s}</div><span>${rating?rating.toFixed(1):'—'}${total?` (${total})`:''}</span>`;
}

function openSheet(p){
  currentPlace=p;
  document.getElementById('place-name').textContent=p.name||'Locale';
  document.getElementById('place-address').textContent=p.formatted_address||p.vicinity||'';
  document.getElementById('place-rating').innerHTML=renderStars(p.rating,p.user_ratings_total);
  const openEl=document.getElementById('place-open');
  if(p.opening_hours){
    const isOpen=p.opening_hours.isOpen? p.opening_hours.isOpen() : p.opening_hours.open_now;
    openEl.textContent=isOpen?'Aperto ora':'Chiuso';
    openEl.style.color=isOpen?'#A78BFA':'#9A93B2';
  }else{openEl.textContent='';}
  const callBtn=document.getElementById('btn-call');
  if(p.formatted_phone_number){callBtn.style.display='inline-flex'; callBtn.disabled=false; callBtn.dataset.tel=p.formatted_phone_number;}
  else{callBtn.style.display='none';}
  document.getElementById('sheet').classList.add('active');
}

function closeSheet(){document.getElementById('sheet').classList.remove('active'); resetActive();}

document.getElementById('btn-directions').addEventListener('click',()=>{
  if(!currentPlace) return;
  const loc=currentPlace.geometry.location;
  const lat=typeof loc.lat==='function'?loc.lat():loc.lat;
  const lng=typeof loc.lng==='function'?loc.lng():loc.lng;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=${currentPlace.place_id}`,'_blank');
});
document.getElementById('btn-call').addEventListener('click',e=>{
  const tel=e.currentTarget.dataset.tel;
  if(tel) window.location.href=`tel:${tel.replace(/\s/g,'')}`;
});
document.getElementById('nearMe').addEventListener('click',()=>{
  if(userPos){map.setCenter(userPos); map.setZoom(15); searchPlaces(activeCategory);}
  else{locateAndSearch();}
});
document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    activeCategory=btn.dataset.cat;
    searchPlaces(activeCategory);
  });
});
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6wAI6R6WztfmYzimz0wFew_ItgzPc-QU&libraries=places&callback=initMap" async defer></script>
</body>
</html>
