<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbo - Il gusto ti orbita</title>
  <meta name="description" content="Il gusto ti orbita intorno. Scopri ristoranti, bar, gelaterie con Orbo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "Inter", system-ui, sans-serif; background: linear-gradient(180deg, #1a0b2e 0%, #0f051a 100%); color: #fff; min-height: 100vh; }
    button, input, select { font: inherit; border: 0; cursor: pointer; background: none; }
    .hidden { display: none !important; }

    /* TOPBAR */
    .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 14px; padding: 11px 18px; background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 60%, #3d1b80 100%); border-bottom: 1px solid rgba(255,179,71,0.2); }
    .topbar-logo { height: 44px; width: 44px; flex-shrink: 0; filter: drop-shadow(0 0 10px rgba(255,180,71,0.6)); }
    .topbar-slogan { flex: 1; font-family: 'Arial Black', Arial, sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; background: linear-gradient(180deg, #FFB347 0%, #FF8C00 60%, #E06500 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* VIEWS */
    .view { display: none; animation: fadeUp 280ms ease; }
    .view.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* HERO */
    .hero { min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 80px 20px 48px; background: radial-gradient(ellipse at center, #2d1b4e 0%, #1a0b2e 65%, #0f051a 100%); }
    .hero::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.7) 1px, transparent 1px); background-size: 90px 90px; opacity: 0.13; pointer-events: none; }
    .hero-logo { position: relative; z-index: 2; width: 150px; height: 150px; animation: pulse-logo 3.5s ease-in-out infinite; }
    @keyframes pulse-logo { 0%,100% { transform: scale(1); filter: drop-shadow(0 0 32px rgba(255,140,0,0.7)); } 50% { transform: scale(1.08); filter: drop-shadow(0 0 56px rgba(255,140,0,1)); } }
    .hero-text { position: relative; z-index: 2; text-align: center; margin-top: 36px; max-width: 540px; }
    .hero-kicker { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #FFB347; margin-bottom: 12px; }
    .hero-title { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(24px, 5vw, 42px); font-weight: 900; line-height: 1.15; margin-bottom: 14px; background: linear-gradient(180deg, #FFB347 0%, #FF8C00 55%, #E06500 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-sub { font-size: 14px; color: #c0aee0; line-height: 1.75; margin-bottom: 28px; }
    .hero-sub strong { color: #FFB347; }
    .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: linear-gradient(135deg, #FF8C00, #FFB347); padding: 15px 36px; border-radius: 999px; font-family: 'Arial Black', sans-serif; font-size: 14px; font-weight: 900; color: #1a0b2e; text-transform: uppercase; box-shadow: 0 6px 24px rgba(255,140,0,0.5); transition: transform 180ms ease; }
    .btn-primary:hover { transform: translateY(-3px); }

    /* MAP VIEW */
    #map { width: 100%; height: calc(100vh - 68px); display: none; }
    .filters { position: fixed; top: 68px; left: 0; right: 0; z-index: 20; display: none; gap: 8px; padding: 12px; background: rgba(26,11,46,0.95); backdrop-filter: blur(10px); overflow-x: auto; }
    .category-btn { padding: 10px 18px; border-radius: 999px; background: rgba(45,27,78,0.8); border: 1px solid rgba(255,140,0,0.3); color: #FFB347; font-weight: 600; white-space: nowrap; transition: all 160ms ease; }
    .category-btn.active { background: #FF8C00; color: #1a0b2e; border-color: #FF8C00; }
    .back-btn { position: fixed; top: 80px; left: 12px; z-index: 25; padding: 10px 16px; border-radius: 12px; background: rgba(26,11,46,0.9); border: 1px solid rgba(255,140,0,0.4); color: #FFB347; font-weight: 700; display: none; }
  </style>
</head>
<body>

  <header class="topbar">
    <img src="OrboLogo.svg" alt="Orbo" class="topbar-logo" />
    <span class="topbar-slogan">Il gusto ti orbita</span>
  </header>

  <main>
    <!-- HOME -->
    <section class="view active" id="view-home">
      <div class="hero">
        <img src="OrboLogo.svg" alt="Orbo" class="hero-logo" />
        <div class="hero-text">
          <p class="hero-kicker">Scopri il gusto</p>
          <h1 class="hero-title">Il locale perfetto,<br>a portata di tap</h1>
          <p class="hero-sub">Cerca per atmosfera, cucina o occasione.<br><strong>Orbo ti porta dove vuoi essere.</strong></p>
          <div class="hero-cta">
            <button class="btn-primary" onclick="startOrbo()">Inizia la ricerca →</button>
          </div>
        </div>
      </div>
    </section>

    <!-- MAP -->
    <button class="back-btn" id="back-btn" onclick="backHome()">← Home</button>
    <div class="filters" id="filters">
      <button class="category-btn active" data-type="restaurant">🍝 Ristoranti</button>
      <button class="category-btn" data-type="bar">☕ Bar</button>
      <button class="category-btn" data-type="ice_cream">🍨 Gelaterie</button>
      <button class="category-btn" data-type="bakery">🧁 Pasticcerie</button>
    </div>
    <div id="map"></div>
  </main>

  <script>
    let map, service, markers = [], userLocation, searchTimeout;
    const API_KEY = "AIzaSyDgzLR7vP74d9N-Buj_1Lana3g8nBRWyEg";
    
    function startOrbo() {
      document.getElementById('view-home').classList.remove('active');
      document.getElementById('filters').style.display = 'flex';
      document.getElementById('map').style.display = 'block';
      document.getElementById('back-btn').style.display = 'block';
      
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          initMap();
        }, () => {
          userLocation = { lat: 44.698, lng: 10.631 };
          initMap();
        });
      } else {
        userLocation = { lat: 44.698, lng: 10.631 };
        initMap();
      }
    }
    
    function backHome() {
      document.getElementById('view-home').classList.add('active');
      document.getElementById('filters').style.display = 'none';
      document.getElementById('map').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
    }
    
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: userLocation, zoom: 14,
        styles: [{ "elementType": "geometry", "stylers": [{ "color": "#212121" }] }, { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] }]
      });
      service = new google.maps.places.PlacesService(map);
      new google.maps.Marker({
        position: userLocation, map: map,
        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: '#FF6600', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
      });
      searchPlaces('restaurant');
      setupFilters();
    }
    
    function searchPlaces(type) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        markers.forEach(m => m.setMap(null)); markers = [];
        const request = {
          location: userLocation, radius: 5000,
          type: type === 'ice_cream' ? 'store' : type,
          keyword: type === 'ice_cream' ? 'gelateria' : type === 'bakery' ? 'pasticceria' : undefined
        };
        service.nearbySearch(request, (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            results.forEach(place => {
              const marker = new google.maps.Marker({ position: place.geometry.location, map: map, title: place.name });
              const infowindow = new google.maps.InfoWindow({
                content: `<div style="color:#000"><b>${place.name}</b><br>${place.vicinity}<br>⭐ ${place.rating || 'N/A'}</div>`
              });
              marker.addListener('click', () => infowindow.open(map, marker));
              markers.push(marker);
            });
          }
        });
      }, 300);
    }
    
    function setupFilters() {
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          searchPlaces(this.dataset.type);
        });
      });
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDgzLR7vP74d9N-Buj_1Lana3g8nBRWyEg&libraries=places"></script>
</body>
</html>
