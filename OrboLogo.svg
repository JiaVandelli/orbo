<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc5500"/>
      <stop offset="100%" stop-color="#e06500"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7c20"/>
      <stop offset="100%" stop-color="#ff9a40"/>
    </linearGradient>

    <filter id="letterGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(180,60,0,0.35)"/>
    </filter>
  </defs>

  <!-- Ombra -->
  <ellipse cx="60" cy="108" rx="28" ry="6" fill="rgba(180,80,0,0.18)"/>

  <!-- Cubo 3D fisso al centro -->
  <g filter="url(#shadow)">
    <polygon points="60,25 90,40 60,55 30,40" fill="url(#topFace)"/>
    <polygon points="30,40 60,55 60,85 30,70" fill="url(#leftFace)"/>
    <polygon points="60,55 90,40 90,70 60,85" fill="url(#rightFace)"/>
  </g>

  <!-- LETTERE ORBITANTI -->
  <g font-family="Arial Black, sans-serif" font-size="16" font-weight="900" filter="url(#letterGlow)">

    <!-- O - Orbita 0° -->
    <text x="60" y="55" text-anchor="middle" fill="#FFE4A3">
      O
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 60 55" 
        to="360 60 55" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="x" 
        values="60;95;60;25;60" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="y" 
        values="20;55;90;55;20" 
        dur="8s" 
        repeatCount="indefinite"/>
    </text>

    <!-- R - Orbita 90° -->
    <text x="60" y="55" text-anchor="middle" fill="#FFD587">
      R
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="90 60 55" 
        to="450 60 55" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="x" 
        values="95;60;25;60;95" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="y" 
        values="55;90;55;20;55" 
        dur="8s" 
        repeatCount="indefinite"/>
    </text>

    <!-- B - Orbita 180° -->
    <text x="60" y="55" text-anchor="middle" fill="#FFB347">
      B
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="180 60 55" 
        to="540 60 55" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="x" 
        values="60;25;60;95;60" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="y" 
        values="90;55;20;55;90" 
        dur="8s" 
        repeatCount="indefinite"/>
    </text>

    <!-- O - Orbita 270° -->
    <text x="60" y="55" text-anchor="middle" fill="#FFE4A3">
      O
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="270 60 55" 
        to="630 60 55" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="x" 
        values="25;60;95;60;25" 
        dur="8s" 
        repeatCount="indefinite"/>
      <animate 
        attributeName="y" 
        values="55;20;55;90;55" 
        dur="8s" 
        repeatCount="indefinite"/>
    </text>

  </g>
</svg>