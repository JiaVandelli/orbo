name: Aggiorna Orbo News

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Crea news.json
        run: |
          mkdir -p data
          node -e "
          const news = [
            {title: 'Pizza gourmet: la tendenza del 2026 spacca', link: 'https://jiavandelli.github.io/orbo/', source: 'Orbo', date: new Date().toISOString()},
            {title: 'Sushi delivery +40% a Milano', link: 'https://jiavandelli.github.io/orbo/', source: 'Orbo', date: new Date().toISOString()},
            {title: 'Aperitivo: torna lo spritz gourmet', link: 'https://jiavandelli.github.io/orbo/', source: 'Orbo', date: new Date().toISOString()}
          ];
          require('fs').writeFileSync('data/news.json', JSON.stringify(news, null, 2));
          "

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Aggiorna news.json'
          file_pattern: data/news.json