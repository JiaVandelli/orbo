<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true

  });

    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Orbo — Il gusto ti orbita intorno</title>
<meta name="theme-color" content="#0b0b12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#0b0b12;color:#e7e8f0;font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:1100px;margin:0 auto;position:relative}

  header{position:relative;z-index:30;display:flex;align-items:center;gap:12px;padding:16px 18px 10px;background:linear-gradient(180deg,rgba(11,11,18,.96) 0%, rgba(11,11,18,.75) 60%, transparent 100%);backdrop-filter:saturate(140%) blur(10px)}
  .logo{width:44px;height:44px;border-radius:14px;background:#13131e;display:grid;place-items:center;box-shadow:0 0 0 1px rgba(139,92,246,.18), inset 0 8px 22px rgba(139,92,246,.12)}
  .title h1{margin:0;font-size:21px;letter-spacing:.3px;font-weight:700;background:linear-gradient(90deg,#8b5cf6,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title p{margin:2px 0 0;font-size:12.5px;color:#9aa0b4;font-weight:400}

  .hero{position:relative;height:116px;display:grid;place-items:center;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:-40% -10% auto;height:200px;background:radial-gradient(55% 50% at 50% 0%, rgba(139,92,246,.28), transparent 70%), radial-gradient(35% 35% at 80% 0%, rgba(236,72,153,.20), transparent 70%);filter:blur(22px);pointer-events:none}
  .orbit-wrap{position:relative;width:122px;height:122px}
  .orbit{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(139,92,246,.18);animation:spin linear infinite}
  .orbit.o1{animation-duration:9s}
  .orbit.o2{inset:14px;border-color:rgba(236,72,153,.20);animation-duration:13s;animation-direction:reverse}
  .orbit.o3{inset:28px;border-color:rgba(139,92,246,.26);animation-duration:17s}
  .orbit i{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#ec4899);box-shadow:0 0 14px rgba(236,72,153,.7),0 0 26px rgba(139,92,246,.5)}
  .orbit.o2 i{width:6px;height:6px;top:-3px;background:linear-gradient(135deg,#ec4899,#8b5cf6)}
  .orbit.o3 i{width:5px;height:5px;top:-2.5px}
  .center-logo{position:absolute;inset:0;display:grid;place-items:center;filter:drop-shadow(0 8px 26px rgba(139,92,246,.35))}
  @keyframes spin{to{transform:rotate(360deg)}}

  .controls{position:relative;z-index:20;padding:0 16px 10px}
  .search{display:flex;align-items:center;gap:8px;background:#12121c;border:1px solid #1f1f31;border-radius:16px;padding:6px 6px 6px 12px;box-shadow:0 8px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.02)}
  .search input{flex:1;background:transparent;border:0;outline:none;color:#fff;font-size:15px;padding:10px 4px;font-family:inherit}
  .search input::placeholder{color:#6d7186}
  .search button{width:42px;height:42px;border:0;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 18px rgba(139,92,246,.35);transition:transform .12s}
  .search button:active{transform:scale(.96)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:12px 2px 6px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:9px 14px;border-radius:999px;background:#13131f;border:1px solid #24243a;color:#b7bad0;font-size:13.5px;font-weight:500;cursor:pointer;transition:.18s;white-space:nowrap}
  .chip:hover{border-color:#313154;color:#dde0f0}
  .chip.active{background:linear-gradient(135deg,rgba(139,92,246,.22),rgba(236,72,153,.22));border-color:transparent;color:#fff;box-shadow:inset 0 0 0 1px rgba(139,92,246,.55),0 6px 18px rgba(139,92,246,.18)}

  #map{flex:1;min-height:320px;border-top:1px solid #1a1a2a;border-radius:22px 22px 0 0;overflow:hidden;position:relative;box-shadow:0 -14px 44px rgba(0,0,0,.55)}

  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:680px;margin:0 auto;background:rgba(14,14,22,.92);backdrop-filter:blur(16px) saturate(140%);border:1px solid #25253a;border-bottom:0;border-radius:24px 24px 0 0;padding:10px 18px 22px;transform:translateY(112%);transition:transform .38s cubic-bezier(.2,.8,.2,1);box-shadow:0 -22px 60px rgba(0,0,0,.65)}
  .sheet.active{transform:translateY(0)}
  .handle{width:46px;height:5px;background:#2a2a42;border-radius:3px;margin:6px auto 12px}
  .sheet h3{margin:4px 2px 6px;font-size:20px;font-weight:700}
  .addr{margin:0 2px 12px;color:#9aa0b4;font-size:14px;line-height:1.35}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:0 2px 14px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;background:#12121f;border:1px solid #26263c;color:#cbd0e6;font-size:13px}
  .pill.rating{color:#fbbf24;border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.08)}
  .pill.rating span{opacity:.75;font-size:12px}
  .pill.open{color:#22c55e;border-color:rgba(34,197,94,.32);background:rgba(34,197,94,.09)}
  .pill.closed{color:#f87171;border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.08)}
  .cta{width:100%;padding:14px 16px;border:0;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 12px 26px rgba(139,92,246,.32);transition:transform .1s}
  .cta:active{transform:translateY(1px)}

  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(18px);background:#141422;border:1px solid #2b2b46;color:#d8daf0;padding:10px 14px;border-radius:12px;font-size:13px;opacity:0;pointer-events:none;transition:.28s;z-index:60;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(min-width:900px){
    header{padding:22px 24px 12px}
    .hero{height:132px}
    .controls{padding:0 24px 12px}
    #map{margin:0 18px 18px;border-radius:24px}
    .sheet{left:auto;right:28px;bottom:28px;width:380px;border-radius:20px;border:1px solid #262640;transform:translateY(16px) scale(.98);opacity:0;pointer-events:none}
    .sheet.active{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/>
          </linearGradient>
        </defs>
        <circle cx="20" cy="20" r="7.5" stroke="url(#g)" stroke-width="3" fill="none"/>
        <ellipse cx="20" cy="20" rx="16" ry="6.5" stroke="url(#g)" stroke-width="2" fill="none" transform="rotate(-24 20 20)" opacity=".9"/>
      </svg>
    </div>
    <div class="title">
      <h1>Orbo</h1>
      <p>Il gusto ti orbita intorno</p>
    </div>
  </header>

  <section class="hero" aria-hidden="true">
    <div class="orbit-wrap">
      <div class="orbit o1"><i></i></div>
      <div class="orbit o2"><i></i></div>
      <div class="orbit o3"><i></i></div>
      <div class="center-logo">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
          <defs><linearGradient id="g2" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
          <circle cx="20" cy="20" r="8" stroke="url(#g2)" stroke-width="3.2" fill="none"/>
        </svg>
      </div>
    </div>
  </section>

  <div class="controls">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a7f9a" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" inputmode="search" placeholder="Cerca pizza, sushi, gelato…" aria-label="Cerca">
      <button id="searchBtn" aria-label="Cerca">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h12M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="chips" role="tablist" aria-label="Categorie">
      <button class="chip active" data-filter="Tutti" role="tab" aria-selected="true">Tutti</button>
      <button class="chip" data-filter="Ristoranti">Ristoranti</button>
      <button class="chip" data-filter="Bar">Bar</button>
      <button class="chip" data-filter="Gelaterie">Gelaterie</button>
      <button class="chip" data-filter="Pasticcerie">Pasticcerie</button>
      <button class="chip" data-filter="Pizza">Pizza</button>
      <button class="chip" data-filter="Sushi">Sushi</button>
    </div>
  </div>

  <div id="map" aria-label="Mappa dei locali"></div>
</div>

<div id="sheet" class="sheet" aria-live="polite">
  <div class="handle" id="sheetHandle"></div>
  <h3 id="placeName">—</h3>
  <p class="addr" id="placeAddress"></p>
  <div class="meta">
    <span class="pill rating" id="placeRating">★ —</span>
    <span class="pill" id="placePrice" style="display:none"></span>
    <span class="pill" id="placeOpen"></span>
  </div>
  <button class="cta" id="openMapsBtn">Apri in Maps</button>
</div>

<div id="toast" class="toast"></div>

<script>
let map, placesService, markers=[], currentPos=null, activePlace=null, selectedFilter='Tutti', userMarker=null;

const darkStyle = [
  {"elementType":"geometry","stylers":[{"color":"#0b0b12"}]},
  {"elementType":"labels.text.fill","stylers":[{"color":"#8a8fa8"}]},
  {"elementType":"labels.text.stroke","stylers":[{"color":"#0b0b12"}]},
  {"featureType":"administrative","elementType":"geometry","stylers":[{"color":"#15151f"}]},
  {"featureType":"poi","stylers":[{"visibility":"off"}]},
  {"featureType":"road","elementType":"geometry","stylers":[{"color":"#1c1c2b"}]},
  {"featureType":"road","elementType":"geometry.stroke","stylers":[{"color":"#0b0b12"}]},
  {"featureType":"road","elementType":"labels.text.fill","stylers":[{"color":"#9aa0b4"}]},
  {"featureType":"transit","stylers":[{"visibility":"off"}]},
  {"featureType":"water","elementType":"geometry","stylers":[{"color":"#07070c"}]},
  {"featureType":"water","elementType":"labels.text.fill","stylers":[{"color":"#51576d"}]}
];

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._tmr); showToast._tmr=setTimeout(()=>t.classList.remove('show'),2200);
}

function initMap(){
  const rome={lat:41.9028,lng:12.4964};
  map = new google.maps.Map(document.getElementById('map'), {
    center: rome,
    zoom: 14,
    styles: darkStyle,
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    clickableIcons:false,
    backgroundColor:'#0b0b12'
  });
  placesService = new google.maps.places.PlacesService(map);

  map.addListener('click', ()=> closeSheet());

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setCenter(currentPos); map.setZoom(15);
      setUserMarker();
      loadPlaces(selectedFilter);
    }, err=>{
      currentPos=rome;
      showToast('Posizione non disponibile, uso Roma');
      setUserMarker();
      loadPlaces(selectedFilter);
    },{enableHighAccuracy:true, timeout:8000});
  } else {
    currentPos=rome; loadPlaces(selectedFilter);
  }
}
window.initMap = initMap;

function setUserMarker(){
  if(!currentPos) return;
  if(userMarker) userMarker.setMap(null);
  userMarker = new google.maps.Marker({
    position: currentPos,
    map,
    zIndex: 2,
    icon:{
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor:'#8b5cf6',
      fillOpacity:.18,
      strokeColor:'#8b5cf6',
      strokeWeight:2
    }
  });
  new google.maps.Marker({
    position: currentPos,
    map,
    zIndex:3,
    icon:{ path:google.maps.SymbolPath.CIRCLE, scale:4, fillColor:'#ec4899', fillOpacity:1, strokeWeight:0 }
  });
}

function clearMarkers(){
  markers.forEach(m=>m.setMap(null)); markers=[];
}

function createMarker(place){
  if(!place.geometry || !place.geometry.location) return;
  const marker = new google.maps.Marker({
    position: place.geometry.location,
    map,
    title: place.name,
    icon:{
      path: google.maps.SymbolPath.CIRCLE,
      scale: 7.5,
      fillColor:'#8b5cf6',
      fillOpacity:.95,
      strokeColor:'#ec4899',
      strokeWeight:2
    }
  });
  marker.addListener('click', ()=> showPlace(place));
  markers.push(marker);
}

function showPlace(place){
  activePlace = place;
  document.getElementById('placeName').textContent = place.name || 'Locale';
  document.getElementById('placeAddress').textContent = place.vicinity || place.formatted_address || '';
  const ratingEl = document.getElementById('placeRating');
  if(place.rating){ ratingEl.innerHTML = `★ ${place.rating.toFixed(1)} <span>(${place.user_ratings_total||0})</span>`; }
  else { ratingEl.innerHTML = '★ —'; }
  const priceEl = document.getElementById('placePrice');
  if(place.price_level){ priceEl.textContent = '€'.repeat(place.price_level); priceEl.style.display='inline-flex'; }
  else { priceEl.style.display='none'; }
  const openEl = document.getElementById('placeOpen');
  if(place.opening_hours){
    const isOpen = place.opening_hours.isOpen ? place.opening_hours.isOpen() : place.opening_hours.open_now;
    openEl.textContent = isOpen ? 'Aperto ora' : 'Chiuso';
    openEl.className = 'pill ' + (isOpen ? 'open':'closed');
  } else { openEl.textContent=''; openEl.className='pill'; }
  document.getElementById('sheet').classList.add('active');
}

function closeSheet(){ document.getElementById('sheet').classList.remove('active'); }

document.getElementById('sheetHandle').addEventListener('click', closeSheet);
document.getElementById('openMapsBtn').addEventListener('click', ()=>{
  if(!activePlace) return;
  const loc = activePlace.geometry.location;
  const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(activePlace.name)}&query_place_id=${activePlace.place_id}`;
  window.open(url, '_blank');
});

function loadPlaces(filter){
  if(!placesService || !currentPos) return;
  clearMarkers();
  const base={location: currentPos, radius: 2500};
  const OK = google.maps.places.PlacesServiceStatus.OK;
  let requests=[];
  switch(filter){
    case 'Tutti':
      requests = [{...base, type:'restaurant'},{...base, type:'cafe'},{...base, type:'bakery'}]; break;
    case 'Ristoranti':
      requests = [{...base, type:'restaurant'}]; break;
    case 'Bar':
      requests = [{...base, type:'bar'},{...base, type:'cafe'}]; break;
    case 'Gelaterie':
      requests = [{...base, keyword:'gelateria'}]; break;
    case 'Pasticcerie':
      requests = [{...base, type:'bakery'},{...base, keyword:'pasticceria'}]; break;
    case 'Pizza':
      requests = [{...base, keyword:'pizza', type:'restaurant'}]; break;
    case 'Sushi':
      requests = [{...base, keyword:'sushi', type:'restaurant'}]; break;
  }
  requests.forEach(req=>{
    placesService.nearbySearch(req, (results, status)=>{
      if(status===OK && results){ results.slice(0,20).forEach(createMarker); }
    });
  });
}

document.querySelectorAll('.chip').forEach(ch=>{
  ch.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    ch.classList.add('active');
    selectedFilter = ch.dataset.filter;
    loadPlaces(selectedFilter);
  });
});

const searchInput = document.getElementById('searchInput');
const doSearch = ()=>{
  const q = searchInput.value.trim();
  if(!q || !currentPos || !placesService) return;
  clearMarkers();
  placesService.textSearch({ location: currentPos, radius: 5000, query: q }, (results, status)=>{
    if(status===google.maps.places.PlacesServiceStatus.OK && results){
      results.slice(0,25).forEach(createMarker);
      if(results[0]?.geometry?.location){ map.panTo(results[0].geometry.location); map.setZoom(15); }
      closeSheet();
    } else {
      showToast('Nessun risultato');
    }
  });
};
document.getElementById('searchBtn').addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6wAI6R6WztfmYzimz0wFew_ItgzPc-QU&libraries=places&callback=initMap&loading=async" async defer></script>
</body>
</html>
