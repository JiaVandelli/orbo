     name: Aggiorna Orbo News
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node scripts/fetch-news.js
      - run: |
          git config user.name "Orbo Bot"
          git config user.email "bot@orbo.app"
          git add data/news.json
          if! git diff --cached --quiet; then
            git commit -m "📰 news $(date +'%d/%m')"
            git push
          fi