name: Aggiorna Orbo News

on:
  schedule:
    - cron: '0 7 * * *'  # 9:00 italiane
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install deps
        run: npm install
      
      - name: Fetch news
        run: node scripts/fetch-news.js
      
      - name: Commit aggiornamento
        run: |
          git config user.name "Orbo Bot"
          git config user.email "bot@orbo.app"
          git add data/news.json
          if ! git diff --cached --quiet; then
            git commit -m "📰 Aggiornamento news $(date +'%d/%m')"
            git push
          else
            echo "Nessuna modifica"
          fi